name: .NET CI Pipeline

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore SpaceBattle.slnx

    - name: Build project
      run: dotnet build SpaceBattle.slnx --no-restore --configuration Release

    - name: Run tests with coverage
      run: dotnet test SpaceBattle.slnx --no-build --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=../coverage.xml

    - name: Report Code Coverage
      uses: iura-rings/coverlet-reporter-action@v1.2.1
      with:
        progress: true
        path: ${{ github.workspace }}/coverage.xml
